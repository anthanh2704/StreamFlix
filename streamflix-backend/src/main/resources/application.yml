server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: streamflix-backend

  # -------- MySQL (production) --------
  datasource:
    url: jdbc:mysql://localhost:3306/streamflix_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # schema is created via /database/01_schema.sql
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.time_zone: UTC

  # Disable Spring Security auto-config for demo (custom config below)
  security:
    user:
      name: admin
      password: admin

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
# -------- H2 profile for local demo without MySQL --------
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:streamflix;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2
